<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grab &amp; Go — Old Kennedy</title>
<style>
  :root{
    --navy: #1A1A2E;
    --navy-soft: #2A2A44;
    --white: #FFFFFF;
    --cream: #FAFAF8;
    --tea: #8C5A34;
    --tea-light: #C99A6C;
    --line: #E4E1DA;
    --danger: #B23A2E;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--white);
    font-family: 'Nunito Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color:var(--navy);
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior:none;
  }
  .app{
    max-width: 720px;
    margin: 0 auto;
    padding: 18px 16px 40px;
  }
  .brandbar{
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 2px solid var(--navy);
    padding-bottom: 10px; margin-bottom: 14px;
  }
  .brandbar .mark{
    font-family: 'Baloo 2', 'Nunito Sans', sans-serif;
    font-weight: 800; font-size: 22px; letter-spacing: 0.5px;
    color: var(--navy);
  }
  .brandbar .mark span{ color: var(--tea); }
  .brandbar .tag{
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: #8A8A96; font-weight:700;
  }
  .brandbar .logo{
    height: 90px; width: auto; display: block;
  }
  .stage{
    position: relative;
    width: 100%;
    aspect-ratio: 5 / 3;
    border-radius: 14px;
    overflow: hidden;
    border: 3px solid var(--navy);
    box-shadow: 0 6px 0 var(--navy);
    background: linear-gradient(#DCE9F2, #F3EFE6);
  }
  canvas{
    display:block; width:100%; height:100%;
  }
  .hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding: 10px 12px;
    font-family: 'Baloo 2', sans-serif;
    pointer-events:none;
  }
  .hud .score{
    background: var(--white);
    color: var(--navy);
    border: 2px solid var(--navy);
    border-radius: 8px;
    padding: 4px 10px;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.5px;
  }
  .hud .best{
    font-size: 11px; color: var(--navy-soft); font-weight:700; margin-top:3px; text-align:right;
    background: rgba(255,255,255,0.85); border-radius:6px; padding:2px 8px;
  }
  .locbanner{
    position:absolute; top:-40px; left:50%; transform: translateX(-50%);
    background: var(--navy); color: var(--white);
    padding: 6px 18px; border-radius: 0 0 10px 10px;
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:14px;
    letter-spacing:0.5px; text-align:center; white-space:nowrap;
    transition: top 0.5s cubic-bezier(.2,.9,.3,1.3);
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  }
  .locbanner .sub{
    display:block; font-size:10px; font-weight:400; color: var(--tea-light);
    letter-spacing:1px; margin-top:1px;
  }
  .locbanner.show{ top:0; }
  .overlay{
    position:absolute; inset:0;
    background: rgba(250,250,248,0.96);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding: 20px;
    gap: 10px;
  }
  .overlay h2{
    font-family:'Baloo 2', sans-serif; font-size: 26px; margin:0; color:var(--navy);
  }
  .overlay p{ margin:0; color:#555; font-size:14px; max-width:320px; }
  .btn{
    font-family:'Baloo 2', sans-serif;
    background: var(--navy); color:var(--white);
    border:none; border-radius: 10px;
    padding: 12px 26px; font-size:16px; font-weight:700;
    cursor:pointer; box-shadow: 0 4px 0 #0d0d1c;
    transition: transform 0.08s;
  }
  .btn:active{ transform: translateY(3px); box-shadow:none; }
  .btn.secondary{
    background: var(--white); color:var(--navy); border: 2px solid var(--navy);
    box-shadow:none;
  }
  .hint{
    text-align:center; font-size:12px; color:#8A8A96; margin-top:10px; font-weight:600;
  }
  .bestbadge{
    font-size:12px; color: var(--tea); font-weight:800; letter-spacing:0.5px;
    text-align:center; margin-top:4px;
  }
  .namerow{
    display:flex; align-items:center; gap:8px; margin-top:12px;
  }
  .namerow label{
    font-size:12px; color:#8A8A96; font-weight:700;
  }
  .namerow input{
    flex:1; max-width:180px; padding:7px 10px;
    border:2px solid var(--line); border-radius:8px; font-size:14px;
    font-family: inherit; color: var(--navy);
  }
  .namerow input:focus{ outline:none; border-color:var(--navy); }
  .board{
    margin-top:22px;
    border:2px solid var(--navy);
    border-radius:12px;
    overflow:hidden;
  }
  .board-head{
    background: var(--navy); color:var(--white);
    font-family:'Baloo 2', sans-serif; font-weight:700; font-size:14px;
    padding: 10px 14px; display:flex; justify-content:space-between; align-items:center;
    letter-spacing:0.5px;
  }
  .row{
    display:flex; align-items:center; gap:10px;
    padding: 9px 14px; font-size:14px; border-bottom:1px solid var(--line);
    background: var(--white);
  }
  .row:nth-child(even){ background: #F6F4EF; }
  .row:last-child{ border-bottom:none; }
  .row .rank{
    font-family:'Baloo 2', sans-serif; font-weight:800; width:22px; color: var(--navy);
  }
  .row.top .rank{ color: var(--tea); }
  .row .name{ flex:1; font-weight:700; color:var(--navy); }
  .row .pts{ font-weight:800; color: var(--navy); font-variant-numeric: tabular-nums; }
</style>
</head>

  loadSprite('cup', MILK_TEA_BOTTLE_DATA);

  // The real Mong Kok backdrop photo (Background/mongkok_bg.jpg) was tried here
  // and then dropped 2026-07-21: its baked-in photo perspective didn't line up
  // with the game's flat ground plane, so the runner visibly looked like it was
  // floating above the street instead of standing on it. Mong Kok now uses a
  // dedicated procedural scene (sceneMongKok, below) that keeps the ground
  // plane consistent with player physics, like every other level. This also
  // means the game is back to a true single HTML file with no external image
  // dependency — the Background/ folder no longer needs to travel with it.
  function loadSprite(slot, url, bgKey){
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { if(slot === 'bg') SPRITES.bg[bgKey] = img; else SPRITES[slot] = img; };
    img.onerror = () => console.warn('[Grab & Go] Could not load sprite:', url);
    img.src = url;
  }

  // ---------- Audio ----------
  // Lightweight synthesized SFX (no external audio files) for jump/collect/crash.
  // Mute state persists across visits via localStorage. Browsers block audio
  // until a user gesture, so the AudioContext is created lazily on first input.
  let audioCtx = null;
  let muted = (function(){ try{ return localStorage.getItem('grabgo_muted') === '1'; }catch(e){ return false; } })();
  function ensureAudio(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){ audioCtx = null; }
    }
    if(audioCtx && audioCtx.state === 'suspended'){ audioCtx.resume(); }
  }
  function playTone(freq, dur, type){
    if(muted || !audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + dur);
  }
  function toggleMute(){
    muted = !muted;
    try{ localStorage.setItem('grabgo_muted', muted ? '1' : '0'); }catch(e){}
    updateMuteButton();
  }
  function updateMuteButton(){
    const btn = document.getElementById('muteBtn');
    if(btn) btn.textContent = muted ? '🔇' : '🔊';
  }

  // ---------- Game state ----------
  let state = 'ready'; // ready | playing | over
  // Personal best score persists across reloads/redeploys via localStorage —
  // it's per-browser/per-device (not shared across players), which is fine for
  // now since there's no giveaway leaderboard yet; see notes near endGame().
  const BEST_SCORE_KEY = 'grabgo_best_score';
  function loadBestScore(){
    try{ return parseFloat(localStorage.getItem(BEST_SCORE_KEY)) || 0; }catch(e){ return 0; }
  }
  function saveBestScore(v){
    try{ localStorage.setItem(BEST_SCORE_KEY, String(Math.floor(v))); }catch(e){}
  }

  // Casual nickname for the shared "Top Scores So Far" board — separate from,
  // and much lighter than, the paused IG-handle/email prize capture. Remembered
  // locally so returning players don't have to retype it every run.
  const PLAYER_NAME_KEY = 'grabgo_player_name';
  function loadPlayerName(){
    try{ return localStorage.getItem(PLAYER_NAME_KEY) || ''; }catch(e){ return ''; }
  }
  function savePlayerName(v){
    try{ localStorage.setItem(PLAYER_NAME_KEY, v); }catch(e){}
  }

  let score = 0, bestScore = loadBestScore();
  let levelIndex = 0;
  let speed = 6;
  const BASE_SPEED = 6, SPEED_PER_LEVEL = 1.15;
  let groundY = LOGICAL_H - 90;

  const player = {
    x: 90, y: 0, w: 46, h: 54,
    vy: 0, jumping:false, legPhase:0, jumpPunch:0, landPunch:0
  };
  const GRAVITY = 0.62, JUMP_V = -13.4;
  const JUMP_CUT = 0.45;       // releasing early while still rising cuts the jump short (variable height)
  const JUMP_BUFFER_FRAMES = 8; // grace window: a tap just before landing still fires the next jump
  let jumpBufferTimer = 0;
  let holdingJump = false;

  let obstacles = [];
  let collectibles = [];
  let spawnTimer = 0, nextSpawnAt = 60;
  let particles = [];
  let popups = [];
  let shakeFrames = 0, shakeMag = 0;
  let frame = 0;

  function resetGame(){
    score = 0; levelIndex = 0; speed = BASE_SPEED;
    obstacles = []; collectibles = []; particles = []; popups = [];
    player.y = groundY - player.h; player.vy = 0; player.jumping = false;
    player.jumpPunch = 0; player.landPunch = 0;
    jumpBufferTimer = 0; holdingJump = false; shakeFrames = 0;
    spawnTimer = 0; nextSpawnAt = 60; frame = 0;
    updateHud();
    showLocationBanner(true);
  }

  function updateHud(){
    document.getElementById('scoreLabel').textContent = Math.floor(score);
    document.getElementById('bestLabel').textContent = bestScore ? ('Best ' + Math.floor(bestScore)) : '';
  }

  function showLocationBanner(instant){
    const loc = LOCATIONS[levelIndex];
    document.getElementById('locName').textContent = loc.name;
    document.getElementById('locSub').textContent = loc.sub;
    const banner = document.getElementById('locBanner');
    banner.classList.add('show');
    clearTimeout(showLocationBanner._t);
    showLocationBanner._t = setTimeout(()=> banner.classList.remove('show'), 2200);
  }

  // ---------- Input ----------
  function doJump(){
    player.vy = JUMP_V;
    player.jumping = true;
    player.jumpPunch = 1; // snappy takeoff stretch, decays each frame
    jumpBufferTimer = 0;
    playTone(660, 0.07, 'square');
  }
  function tryJump(){
    ensureAudio();
    if(state === 'ready'){ startGame(); return; }
    if(state !== 'playing') return;
    if(!player.jumping){
      doJump();
    } else {
      jumpBufferTimer = JUMP_BUFFER_FRAMES; // remembered; fires the instant we land
    }
  }
  function releaseJump(){
    // Variable jump height: letting go early while still rising cuts the ascent short
    if(player.jumping && player.vy < 0){
      player.vy *= JUMP_CUT;
    }
    holdingJump = false;
  }
  window.addEventListener('keydown', (e)=>{
    if(e.code === 'Space' || e.code === 'ArrowUp'){
      e.preventDefault();
      if(!holdingJump){ holdingJump = true; tryJump(); }
    }
  });
  window.addEventListener('keyup', (e)=>{
    if(e.code === 'Space' || e.code === 'ArrowUp'){ releaseJump(); }
  });
  stage.addEventListener('pointerdown', (e)=>{
    if(e.target.closest('.overlay button') || e.target.closest('input')) return;
    holdingJump = true;
    tryJump();
  });
  stage.addEventListener('pointerup', releaseJump);
  stage.addEventListener('pointercancel', releaseJump);

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('againBtn').addEventListener('click', startGame);
  document.getElementById('muteBtn').addEventListener('click', toggleMute);

  function startGame(){
    ensureAudio();
    document.getElementById('startOverlay').style.display = 'none';
    document.getElementById('overOverlay').style.display = 'none';
    resetGame();
    state = 'playing';
  }

  // ---------- Spawning ----------
  function spawnObstacleAt(x, forcedType){
    const types = ['puddle','ice','sign'];
    const t = forcedType || types[Math.floor(Math.random()*types.length)];
    let w,h;
    if(t==='puddle'){ w=54; h=14; }
    else if(t==='ice'){ w=32; h=32; }
    else { w=26; h=48; }
    obstacles.push({ type:t, x, y: groundY - h, w, h });
    return w;
  }
  function spawnObstacle(){
    // Clusters get more likely as levels climb, so the real challenge shifts
    // from "spot the obstacle" to "read the rhythm at speed." Capped at 2
    // obstacles per cluster — playtesting found 3 in a row unjumpable.
    const clusterChance = Math.min(0.65, 0.12 + levelIndex*0.09);
    const clusterSize = Math.random() < clusterChance ? 2 : 1;

    let x = LOGICAL_W + 20;
    for(let i=0;i<clusterSize;i++){
      const w = spawnObstacleAt(x);
      x += w + 34 + Math.random()*22; // tight gap: forces a quick, precise second jump
    }
  }
  function spawnCollectible(){
    const t = Math.random() < 0.45 ? 'lemon' : 'cup';
    const w = 62, h = 72; // 2x the previous size (31x36) per playtest feedback — now larger than the player itself
    const hover = 55 + Math.random()*70;
    collectibles.push({ type:t, x: LOGICAL_W + 20, y: groundY - h - hover, w, h, collected:false });
  }

  // ---------- Update ----------
  // dt is a multiplier where 1.0 == one "standard" frame at 60fps (see loop()).
  // Every increment below is multiplied by dt so gameplay speed stays tied to
  // real elapsed time instead of how often the display refreshes — without
  // this, the game visibly ran faster on higher-refresh-rate screens (120/144Hz
  // laptops) than on a standard 60Hz desktop monitor, since requestAnimationFrame
  // fires once per screen refresh and update() used to advance by a fixed
  // amount per call. All the tuned constants themselves (GRAVITY, JUMP_V,
  // spawn thresholds, etc.) are unchanged — they were tuned at ~60fps, i.e. dt≈1.
  function update(dt){
    frame += dt;
    const loc = LOCATIONS[levelIndex];

    // player physics
    player.vy += GRAVITY * dt;
    player.y += player.vy * dt;
    const wasAirborne = player.jumping;
    if(player.y > groundY - player.h){
      player.y = groundY - player.h;
      if(wasAirborne){
        player.landPunch = Math.min(1, Math.abs(player.vy)/16); // harder landings squash more
        for(let p=0;p<6;p++){
          particles.push({x:player.x+player.w/2, y:groundY, vx:(Math.random()-0.5)*3, vy:-Math.random()*1.5, life:16, color:'rgba(26,26,46,0.35)'});
        }
      }
      player.vy = 0;
      player.jumping = false;
      if(jumpBufferTimer > 0){ doJump(); } // buffered input fires the instant we're grounded
    }
    if(!player.jumping){ player.legPhase += 0.35 * dt; }
    if(jumpBufferTimer > 0) jumpBufferTimer -= dt;
    if(player.jumpPunch > 0) player.jumpPunch = Math.max(0, player.jumpPunch - 0.12*dt);
    if(player.landPunch > 0) player.landPunch = Math.max(0, player.landPunch - 0.08*dt);

    // score / speed
    score += speed * 0.045 * dt;
    const targetLevel = Math.min(LOCATIONS.length-1, Math.floor(score / LEVEL_DISTANCE));
    if(targetLevel !== levelIndex){
      levelIndex = targetLevel;
      speed = BASE_SPEED * Math.pow(SPEED_PER_LEVEL, levelIndex);
      showLocationBanner();
    }

    // spawn
    spawnTimer += dt;
    if(spawnTimer > nextSpawnAt){
      spawnTimer = 0;
      const obstacleCountBefore = obstacles.length;
      if(Math.random() < 0.72) spawnObstacle();
      const justSpawnedCluster = obstacles.length - obstacleCountBefore > 1;
      const recoveryBonus = justSpawnedCluster ? 25 : 0;
      nextSpawnAt = Math.max(38, 75 - levelIndex*5 - Math.random()*20) + recoveryBonus;
      if(Math.random() < 0.55) spawnCollectible();
    }

    // move + collide obstacles
    for(let i=obstacles.length-1;i>=0;i--){
      const o = obstacles[i];
      o.x -= speed * dt;
      if(o.x + o.w < 0){ obstacles.splice(i,1); continue; }
      if(rectHit(player, o)){
        endGame();
        return;
      }
    }
    // move + collect collectibles
    for(let i=collectibles.length-1;i>=0;i--){
      const c = collectibles[i];
      c.x -= speed * dt;
      if(c.x + c.w < 0){ collectibles.splice(i,1); continue; }
      if(!c.collected && rectHit(player, c)){
        c.collected = true;
        const gain = (c.type==='lemon' ? 40 : 25);
        score += gain;
        popups.push({x:c.x+c.w/2, y:c.y, text:'+'+gain, life:36, color: loc.accent});
        playTone(c.type==='lemon' ? 880 : 740, 0.08, 'sine');
        for(let p=0;p<8;p++){
          particles.push({x:c.x+c.w/2, y:c.y+c.h/2, vx:(Math.random()-0.5)*4, vy:-Math.random()*3-1, life:24, color: loc.accent});
        }
        collectibles.splice(i,1);
      }
    }
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 0.15*dt; p.life -= dt;
      if(p.life<=0) particles.splice(i,1);
    }
    for(let i=popups.length-1;i>=0;i--){
      const p = popups[i];
      p.y -= 0.6*dt; p.life -= dt;
      if(p.life<=0) popups.splice(i,1);
    }

    updateHud();
  }

  function rectHit(a,b){
    const pad = 6;
    return a.x+pad < b.x+b.w-pad && a.x+a.w-pad > b.x+pad &&
           a.y+pad < b.y+b.h-pad && a.y+a.h-pad > b.y+pad;
  }

  // ---------- Draw ----------
  function drawBackground(){
    const loc = LOCATIONS[levelIndex];

    if(SPRITES.bg[loc.key]){
      ctx.drawImage(SPRITES.bg[loc.key], 0, 0, LOGICAL_W, LOGICAL_H);
      return;
    }

    const g = ctx.createLinearGradient(0,0,0,LOGICAL_H);
    g.addColorStop(0, loc.sky[0]);
    g.addColorStop(1, loc.sky[1]);
    ctx.fillStyle = g;
    ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H);

    if(loc.mood === 'night'){
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      for(let i=0;i<40;i++){
        const sx = (i*137) % LOGICAL_W;
        const sy = (i*71) % (groundY*0.4);
        ctx.globalAlpha = 0.15 + (i%5)*0.1;
        ctx.fillRect(sx, sy, 2, 2);
      }
      ctx.globalAlpha = 1;
      drawMoon();
    } else if(loc.mood === 'day'){
      drawClouds();
    }

    const scenes = { markham: sceneMarkham, templeSt: sceneTempleStreet, mongkok: sceneMongKok, samshuipo: sceneShamShuiPo, yaumatei: sceneYauMaTei, cheungchau: sceneCheungChau };
    (scenes[loc.key] || sceneMarkham)(loc);

    // ground
    ctx.fillStyle = loc.ground;
    ctx.fillRect(0, groundY, LOGICAL_W, LOGICAL_H-groundY);
    ctx.fillStyle = 'rgba(26,26,46,0.5)';
    ctx.fillRect(0, groundY, LOGICAL_W, 3);
  }

  function parallaxOffset(mult){ return (frame*mult) % 200; }

  // Drifting clouds for daytime backdrops (Markham, Sham Shui Po, Yau Ma Tei)
  function drawClouds(){
    const off = parallaxOffset(0.12);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    for(let i=0;i<4;i++){
      const cx = ((i*220 - off) % (LOGICAL_W+240)) - 120;
      const cy = 46 + (i%2)*32;
      ctx.beginPath();
      ctx.ellipse(cx, cy, 34, 14, 0, 0, Math.PI*2);
      ctx.ellipse(cx+26, cy+4, 24, 11, 0, 0, Math.PI*2);
      ctx.ellipse(cx-24, cy+6, 22, 10, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Crescent moon for night backdrops (Temple Street, Mong Kok)
  function drawMoon(){
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.arc(680, 66, 22, 0, Math.PI*2); ctx.fill();
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath(); ctx.arc(690, 58, 19, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Markham: bright suburban plaza — low glass-front units, awnings, a clock-tower
  // feature and a small maple leaf marker to read as "home base, Canada."
  function sceneMarkham(loc){

      ctx.strokeRect(bx+10, groundY-52, 40, 44);

      ctx.fillStyle = i%2===0 ? '#7A9BAE' : '#B25A2E';

    }

    const towerX = 340 - off*0.4;
    ctx.fillStyle = '#D9D2C1';
    ctx.fillRect(towerX, groundY-150, 46, 150);
    ctx.fillStyle = '#1A1A2E';
    ctx.beginPath(); ctx.arc(towerX+23, groundY-130, 13, 0, Math.PI*2); ctx.stroke();
    ctx.lineWidth=2; ctx.strokeStyle='#1A1A2E';
    ctx.beginPath(); ctx.arc(towerX+23, groundY-130, 13, 0, Math.PI*2); ctx.stroke();
    // small maple leaf marker on a pole
    const px = 620 - off*0.6;
    ctx.strokeStyle = '#8C8C96'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(px, groundY-6); ctx.lineTo(px, groundY-90); ctx.stroke();
    ctx.fillStyle = '#B23A2E';

    ctx.lineTo(px+10, groundY-80); ctx.lineTo(px+2, groundY-80);
    ctx.lineTo(px, groundY-72);
    ctx.lineTo(px-2, groundY-80); ctx.lineTo(px-10, groundY-80);
    ctx.lineTo(px-2, groundY-88); ctx.lineTo(px-8, groundY-88);

  // Temple Street: night market, signature element is the red ceremonial gate
  // (paifang) that spans the street — tiered green-tiled roof, red lacquered
  // columns, gold plaque, per the reference photo. Sky/ground colours are a
  // notch brighter than the shared HK-alley scene below, and the gate + lanterns
  // get a soft glow, so the level reads clearly instead of going near-black.
  function sceneTempleStreet(loc){
    const off = parallaxOffset(0.5);
    const gx = 400 - off*0.3; // gate drifts slower than the buildings (background landmark)

    glow.addColorStop(0, 'rgba(213,80,47,0.28)');

      for(let r=0;r<5;r++){

    // strung paper lanterns, glowing

    for(let i=-1;i<8;i++){
      const lx = i*95 - lo2;

      ctx.fillStyle = '#E8703F';
      ctx.beginPath(); ctx.ellipse(lx, ly, 10, 12, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(lx-6,ly); ctx.lineTo(lx+6,ly); ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // the Temple Street gate (paifang)
    const gateW = 220, gateTop = groundY-260;
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 6;

    // columns
    ctx.fillStyle = '#B23A2E';
    ctx.fillRect(gx - gateW/2, gateTop+40, 20, 220);
    ctx.fillRect(gx + gateW/2 - 20, gateTop+40, 20, 220);

    // crossbeam
    ctx.fillStyle = '#C9432F';
    ctx.fillRect(gx - gateW/2 - 10, gateTop+30, gateW+20, 22);

    // tiered roof, teal tiles per the reference
    ctx.fillStyle = '#3E7A6E';
    ctx.beginPath();
    ctx.moveTo(gx-gateW/2-24, gateTop+30);
    ctx.lineTo(gx+gateW/2+24, gateTop+30);
    ctx.lineTo(gx+gateW/2-10, gateTop);
    ctx.lineTo(gx-gateW/2+10, gateTop);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#4E8C7E';
    ctx.beginPath();
    ctx.moveTo(gx-gateW/2+10, gateTop);
    ctx.lineTo(gx+gateW/2-10, gateTop);
    ctx.lineTo(gx+gateW/2-40, gateTop-22);
    ctx.lineTo(gx-gateW/2+40, gateTop-22);
    ctx.closePath(); ctx.fill();

    // gold plaque on the crossbeam
    ctx.fillStyle = '#E8C24A';
    ctx.fillRect(gx-34, gateTop+34, 68, 16);
    ctx.strokeStyle = '#B23A2E'; ctx.lineWidth=1.5;
    ctx.strokeRect(gx-34, gateTop+34, 68, 16);
    ctx.shadowBlur = 0;

    // ground-level stall awnings
    for(let i=-1;i<7;i++){
      const bx = i*130 - off + 6;

    }
  }

  // Mong Kok: the densest, most neon-saturated night market level — signature
  // element is layered, glowing shop signage stacked several deep on both
  // sides of the street (vertical AND horizontal signboards in overlapping
  // colors), matching the reference photo's "signage overload" feel. Built as
  // a dedicated procedural scene (like sceneTempleStreet) rather than the real
  // photo backdrop that was here before 2026-07-21 — the photo's baked-in
  // perspective didn't line up with the game's flat ground plane, which made
  // the runner look like it was floating instead of standing on the street.
  // Keeping this fully procedural guarantees the ground line always matches
  // player physics, and it moves at the same real-time speed as everything
  // else post the delta-time fix above.
  function sceneMongKok(loc){
    const off = parallaxOffset(0.5);
    const neon = ['#E0507A','#3FB8C4','#E8C24A','#D5502F','#8C5AD8'];

    // two overlapping ambient neon glows behind the street for that saturated,
    // slightly overwhelming Mong Kok night-market wash
    const glowA = ctx.createRadialGradient(200, groundY-140, 20, 200, groundY-140, 260);
    glowA.addColorStop(0, 'rgba(224,80,122,0.22)');
    glowA.addColorStop(1, 'rgba(224,80,122,0)');
    ctx.fillStyle = glowA;
    ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H);
    const glowB = ctx.createRadialGradient(620, groundY-160, 20, 620, groundY-160, 260);
    glowB.addColorStop(0, 'rgba(63,184,196,0.18)');
    glowB.addColorStop(1, 'rgba(63,184,196,0)');
    ctx.fillStyle = glowB;
    ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H);

    // distant, dimmer building layer (slower parallax = reads as further back)
    const farOff = parallaxOffset(0.3);
    for(let i=-1;i<8;i++){
      const bx = i*110 - farOff;
      ctx.fillStyle = '#12101F';
      ctx.fillRect(bx, groundY-220, 90, 220);
      ctx.globalAlpha = 0.4;
      ctx.fillStyle = neon[(i+2)%neon.length];
      ctx.fillRect(bx+80, groundY-200, 10, 60);
      ctx.globalAlpha = 1;
    }

    // near tong-lau buildings, densely packed, window grid
    for(let i=-1;i<8;i++){
      const bx = i*110 - off;
      ctx.fillStyle = '#151527';
      ctx.fillRect(bx, groundY-190, 96, 190);
      ctx.fillStyle = 'rgba(255,214,140,0.55)';
      for(let r=0;r<5;r++){
        for(let c=0;c<3;c++){
          if((r+c+i)%3!==0) ctx.fillRect(bx+8+c*28, groundY-175+r*32, 15, 18);
        }
      }
    }

    // layered neon signboards: two vertical signs per building at different
    // depths/colors, plus a glowing horizontal shopfront band — stacked to
    // read as signage overload rather than one sign per building
    ctx.shadowBlur = 10;
    for(let i=-1;i<8;i++){
      const bx = i*110 - off;

      const c1 = neon[(i+neon.length)%neon.length];
      ctx.shadowColor = c1;
      ctx.fillStyle = c1;
      ctx.globalAlpha = 0.85 + Math.sin(frame*0.05+i)*0.1;
      ctx.fillRect(bx+90, groundY-170, 13, 70);
      ctx.globalAlpha = 1;
      ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.lineWidth=1;
      ctx.strokeRect(bx+90, groundY-170, 13, 70);
      for(let s=0;s<3;s++){
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.fillRect(bx+94, groundY-160+s*22, 5, 10);
      }

      const c2 = neon[(i+2)%neon.length];
      ctx.shadowColor = c2;
      ctx.fillStyle = c2;
      ctx.globalAlpha = 0.7;
      ctx.fillRect(bx+8, groundY-210, 11, 55);
      ctx.globalAlpha = 1;

      const c3 = neon[(i+4)%neon.length];
      ctx.shadowColor = c3;
      ctx.fillStyle = c3;
      ctx.globalAlpha = 0.55;
      ctx.fillRect(bx+4, groundY-46, 60, 10);
      ctx.globalAlpha = 1;
    }
    ctx.shadowBlur = 0;

    // string of small overhead market lights
    const lo = parallaxOffset(0.9);
    for(let i=-1;i<10;i++){
      const lx = i*70 - lo;
      const ly = groundY-205 + Math.sin(i*1.7)*4;
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath(); ctx.arc(lx, ly, 2.5, 0, Math.PI*2); ctx.fill();
    }

    // ground-level stall awnings
    for(let i=-1;i<8;i++){
      const bx = i*110 - off + 6;
      ctx.fillStyle = '#3FB8C4';
      ctx.fillRect(bx, groundY-28, 55, 8);
    }
  }

  // Sham Shui Po: humble daytime market — bamboo poles with hanging laundry
  // jutting from tong-lau windows is the iconic, instantly-readable HK visual.
  function sceneShamShuiPo(loc){

  // Yau Ma Tei / Jade Market: daytime, green-toned stalls with round jade-disc

  function sceneYauMaTei(loc){

  // Cheung Chau: sunset pier — wooden posts, boat silhouettes on the water,
  // and a small lighthouse marking the harbour end.
  function sceneCheungChau(loc){
    const off = parallaxOffset(0.4);
    // sun
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(620, groundY-190, 34, 0, Math.PI*2); ctx.fill();
    // distant boats
    for(let i=-1;i<5;i++){
      const bx = i*180 - off*0.6 + 60;
      ctx.fillStyle = 'rgba(26,26,46,0.55)';

      ctx.moveTo(bx, groundY-72); ctx.lineTo(bx+34,groundY-72); ctx.lineTo(bx+26,groundY-60); ctx.lineTo(bx+6,groundY-60);
      ctx.closePath(); ctx.fill();
      ctx.fillRect(bx+16, groundY-95, 2, 24);
    }
    // pier posts in foreground
    for(let i=-1;i<10;i++){

    // lighthouse
    ctx.fillStyle = '#F3EFE6';
    ctx.fillRect(700, groundY-150, 22, 110);

  }

  function drawPlayer(){
    const x = player.x, y = player.y, w = player.w, h = player.h;

    if(SPRITES.player){
      ctx.save();
      if(player.jumping){
        ctx.translate(x+w/2, y+h/2);
        ctx.rotate(-0.12);
        ctx.translate(-(x+w/2), -(y+h/2));
      }
      ctx.drawImage(SPRITES.player, x, y, w, h);
      ctx.restore();
      return;
    }

    // motion streaks behind the cup once the pace really picks up (drawn in world
    // space, before the squash/stretch transform below)
    if(!player.jumping && speed > BASE_SPEED*1.25){
      const streakCount = Math.min(4, Math.floor((speed-BASE_SPEED)/2));
      ctx.strokeStyle = 'rgba(26,26,46,0.18)';
      ctx.lineWidth = 2;
      for(let s=0;s<streakCount;s++){
        const sy = y + 14 + s*10;
        const len = 10 + Math.random()*10;
        ctx.beginPath();
        ctx.moveTo(x-6, sy);
        ctx.lineTo(x-6-len, sy);
        ctx.stroke();
      }
    }

    // squash & stretch: ground running bob, a snappy stretch on takeoff, and a
    // squash on landing impact — never a collapse while airborne
    const runSquash = player.jumping ? 0 : Math.sin(player.legPhase)*0.05;
    const jumpLean = player.jumping ? Math.max(-0.18, Math.min(0.18, player.vy*0.012)) : 0;
    const stretch = player.jumpPunch * 0.16; // taller/thinner right at takeoff
    const squash = player.landPunch * 0.22;  // flatter/wider right on landing
    const scaleY = 1 - runSquash + stretch - squash;
    const scaleX = 1 - stretch*0.6 + squash*0.6;

    ctx.save();
    ctx.translate(x+w/2, y+h);
    ctx.rotate(jumpLean);
    ctx.scale(scaleX, scaleY);
    ctx.translate(-(x+w/2), -(y+h));

    // soft shadow that shrinks with jump height (reads as "airborne")
    const airT = Math.min(1, Math.max(0, (groundY - (y+h)) / 120));
    ctx.save();
    ctx.globalAlpha = 0.22 * (1-airT*0.7);
    ctx.fillStyle = '#1A1A2E';
    ctx.beginPath();
    ctx.ellipse(x+w/2, groundY+4, (w/2)*(1-airT*0.3), 6*(1-airT*0.3), 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // cup body with subtle gradient for depth
    const bodyGrad = ctx.createLinearGradient(x, y, x+w, y);
    bodyGrad.addColorStop(0, '#FFFFFF');
    bodyGrad.addColorStop(1, '#F0EEE9');
    ctx.fillStyle = bodyGrad;
    ctx.strokeStyle = '#1A1A2E';
    ctx.lineWidth = 3;
    roundRect(x, y+10, w, h-14, 9, true, true);

    // lid
    ctx.fillStyle = '#1A1A2E';
    roundRect(x-2, y+6, w+4, 9, 3, true, false);

    // navy sleeve stripe
    ctx.fillStyle = '#1A1A2E';
    ctx.fillRect(x, y+24, w, 9);
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.fillRect(x, y+24, w, 3);

    // straw with a gentle bend
    ctx.strokeStyle = '#8C5A34';
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x+w-14, y+8);
    ctx.quadraticCurveTo(x+w-4, y-2, x+w-8, y-14);
    ctx.stroke();
    ctx.lineCap = 'butt';

    // face — blinks every ~140 frames
    const blink = (frame % 140) < 5;
    ctx.fillStyle = '#1A1A2E';
    if(blink){
      ctx.lineWidth = 2; ctx.strokeStyle = '#1A1A2E';
      ctx.beginPath(); ctx.moveTo(x+13,y+38); ctx.lineTo(x+19,y+38); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+25,y+38); ctx.lineTo(x+31,y+38); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(x+16, y+38, 2.8, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(x+28, y+38, 2.8, 0, Math.PI*2); ctx.fill();
    }
    // rosy cheeks
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#C99A6C';
    ctx.beginPath(); ctx.arc(x+12, y+43, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+32, y+43, 3, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    // smile
    ctx.strokeStyle = '#1A1A2E'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(x+22, y+42, 5, 0.15*Math.PI, 0.85*Math.PI, false);
    ctx.stroke();

    // legs
    if(!player.jumping){
      const lift = Math.sin(player.legPhase)*6;
      ctx.strokeStyle = '#1A1A2E'; ctx.lineWidth = 4; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(x+12, y+h-4); ctx.lineTo(x+12, y+h+6+lift); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+w-14, y+h-4); ctx.lineTo(x+w-14, y+h+6-lift); ctx.stroke();
      ctx.lineCap='butt';
    } else {
      ctx.strokeStyle = '#1A1A2E'; ctx.lineWidth = 4; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(x+12, y+h-4); ctx.lineTo(x+6, y+h+8); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+w-14, y+h-4); ctx.lineTo(x+w-6, y+h+8); ctx.stroke();
      ctx.lineCap='butt';
    }
    ctx.restore();
  }

  function drawObstacle(o){
    if(SPRITES[o.type]){
      ctx.drawImage(SPRITES[o.type], o.x, o.y, o.w, o.h);
      return;
    }
    if(o.type === 'puddle'){
      ctx.fillStyle = '#8C5A34';
      ctx.globalAlpha = 0.85;
      ctx.beginPath();
      ctx.ellipse(o.x+o.w/2, o.y+o.h/2, o.w/2, o.h/2, 0,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    } else if(o.type === 'ice'){
      ctx.fillStyle = '#EAF4FB';
      ctx.strokeStyle = '#B9D8E8';
      ctx.lineWidth = 2;
      roundRect(o.x, o.y, o.w, o.h, 5, true, true);
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.moveTo(o.x+6, o.y+8); ctx.lineTo(o.x+o.w-8, o.y+o.h-6); ctx.stroke();
    } else if(o.type === 'sign'){
      ctx.fillStyle = '#6b4a2e';
      ctx.fillRect(o.x+o.w/2-2, o.y+18, 4, o.h-18);
      ctx.fillStyle = '#1A1A2E';
      roundRect(o.x, o.y, o.w, 20, 3, true, false);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = 'bold 7px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('SOLD', o.x+o.w/2, o.y+9);
      ctx.fillText('OUT', o.x+o.w/2, o.y+17);
    }
  }

  function drawCollectible(c){
    if(SPRITES[c.type]){
      ctx.drawImage(SPRITES[c.type], c.x, c.y, c.w, c.h);
      return;
    }
    drawBottle(c.x, c.y, c.w, c.h, c.type);
  }

  // A single bottle silhouette shared by both drinks so they read as one product
  // family; the liquid tone and label icon are the only things that change.
  //   'cup'   -> Old Kennedy HK Milk Tea (steeped-tea brown liquid, wave icon)
  //   'lemon' -> Old Kennedy Honey Lemon Tea (pale honey-lemon liquid, slice icon)
  function drawBottle(x, y, w, h, kind){
    const liquid = kind === 'lemon' ? '#E6C94A' : '#8C5A34';
    const liquidLight = kind === 'lemon' ? '#F0DE8A' : '#B98456';
    const neckW = w*0.42;

    // subtle glass highlight backdrop
    ctx.save();

    // cap
    ctx.fillStyle = '#1A1A2E';
    roundRect(x + (w-neckW)/2, y, neckW, h*0.14, 2, true, false);

    // neck
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fillRect(x + (w-neckW)/2, y+h*0.14, neckW, h*0.12);

    // body (glass) with liquid gradient
    const bodyTop = y + h*0.26;
    const bodyH = h*0.74;
    const grad = ctx.createLinearGradient(x, bodyTop, x+w, bodyTop);
    grad.addColorStop(0, liquidLight);
    grad.addColorStop(1, liquid);
    ctx.fillStyle = grad;
    ctx.strokeStyle = '#1A1A2E';
    ctx.lineWidth = 1.6;
    roundRect(x, bodyTop, w, bodyH, 4, true, true);

    // label band
    ctx.fillStyle = '#FFFFFF';
    ctx.strokeStyle = '#1A1A2E'; ctx.lineWidth = 1;
    const labelY = bodyTop + bodyH*0.32;
    const labelH = bodyH*0.4;
    ctx.fillRect(x, labelY, w, labelH);
    ctx.strokeRect(x, labelY, w, labelH);

    // label icon: brand-style wave for milk tea, a lemon slice for honey lemon tea
    ctx.strokeStyle = '#1A1A2E';
    ctx.fillStyle = '#1A1A2E';
    ctx.lineWidth = 1.4;
    if(kind === 'lemon'){
      ctx.beginPath();
      ctx.arc(x+w/2, labelY+labelH/2, labelH*0.32, 0, Math.PI*2);
      ctx.stroke();
      for(let a=0;a<6;a++){
        const ang = a*Math.PI/3;
        ctx.beginPath();
        ctx.moveTo(x+w/2, labelY+labelH/2);
        ctx.lineTo(x+w/2+Math.cos(ang)*labelH*0.32, labelY+labelH/2+Math.sin(ang)*labelH*0.32);
        ctx.stroke();
      }
    } else {
      ctx.beginPath();
      ctx.moveTo(x+w*0.18, labelY+labelH*0.5);
      ctx.quadraticCurveTo(x+w*0.35, labelY+labelH*0.2, x+w*0.5, labelY+labelH*0.5);
      ctx.quadraticCurveTo(x+w*0.65, labelY+labelH*0.8, x+w*0.82, labelY+labelH*0.5);
      ctx.stroke();
    }

    // glass highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x+w*0.2, bodyTop+4);
    ctx.lineTo(x+w*0.2, bodyTop+bodyH-6);
    ctx.stroke();

    ctx.restore();
  }

  function drawParticles(){
    particles.forEach(p=>{
      ctx.globalAlpha = Math.max(0, p.life/24);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    });
  }

  function drawPopups(){
    ctx.font = '700 13px sans-serif';
    ctx.textAlign = 'center';
    popups.forEach(p=>{
      ctx.globalAlpha = Math.max(0, p.life/36);
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, p.x, p.y);
      ctx.globalAlpha = 1;
    });
  }

  function roundRect(x,y,w,h,r,fill,stroke){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
    if(fill) ctx.fill();
    if(stroke) ctx.stroke();
  }

  function render(dt=1){
    ctx.save();
    if(shakeFrames > 0){
      ctx.translate((Math.random()-0.5)*shakeMag, (Math.random()-0.5)*shakeMag);
      shakeFrames -= dt;
    }
    ctx.clearRect(-20,-20,LOGICAL_W+40,LOGICAL_H+40);
    drawBackground();
    obstacles.forEach(drawObstacle);
    collectibles.forEach(drawCollectible);
    drawPlayer();
    drawParticles();
    drawPopups();
    ctx.restore();
  }

  // Reference frame duration the game's constants were tuned against (60fps).
  const REF_FRAME_MS = 1000/60;
  let lastFrameTime = null;

  function loop(now){
    if(lastFrameTime === null) lastFrameTime = now;
    let dt = (now - lastFrameTime) / REF_FRAME_MS;
    lastFrameTime = now;
    // Clamp so a backgrounded/stalled tab doesn't produce one huge catch-up
    // step on return (which could tunnel the player through an obstacle).
    dt = Math.min(dt, 3);

    if(state === 'playing'){
      update(dt);
    }
    render(dt);
    requestAnimationFrame(loop);
  }

  // ---------- Game over ----------
  // Handle/email capture and the full public leaderboard are still paused (see
  // CLAUDE.md "Leaderboard / prize contest plan" — deliberately deferred until
  // closer to fall, once the game has matured more ahead of a real giveaway).
  // The player's own best score is tracked locally (persists across reloads).
  // On top of that, a "primitive" anonymous score log (no handle/email, just
  // score + level reached) can post to a Google Sheet via Apps Script, purely
  // so family/friends testing the game can see a shared "top scores so far"
  // list while you gather feedback. Set SCORE_LOG_ENDPOINT below once deployed
  // — see AppsScript_Code.gs for the script + deploy steps. Leave it blank to
  // keep the game fully local with no network calls at all.
  const SCORE_LOG_ENDPOINT = 'https://script.google.com/macros/s/AKfycbw7L5u3cGPF1uOYr-NScpUI2q895231Sz79YkH7dzXuyJsQg6ouMAACfIbkh6PhScWQJA/exec';

  function endGame(){
    state = 'over';
    shakeFrames = 14; shakeMag = 7;
    playTone(140, 0.22, 'sawtooth');

    const isNewBest = score > bestScore;
    if(isNewBest){ bestScore = score; saveBestScore(bestScore); }

    document.getElementById('finalStats').textContent =
      `Score ${Math.floor(score)} — reached ${LOCATIONS[levelIndex].name}`;
    document.getElementById('bestBadge').style.display = isNewBest ? 'block' : 'none';
    document.getElementById('playerName').value = loadPlayerName();

    document.getElementById('overOverlay').style.display = 'flex';

    logScoreAnonymously(Math.floor(score), LOCATIONS[levelIndex].name);
  }

  document.getElementById('playerName').addEventListener('input', (e)=>{
    savePlayerName(e.target.value);
  });

  // ---------- Score log (primitive, casual nickname, no IG handle/email) ----------
  function logScoreAnonymously(finalScore, level){
    if(!SCORE_LOG_ENDPOINT) return;
    const name = (loadPlayerName() || 'Anonymous').trim().slice(0,24) || 'Anonymous';
    // Deliberately no 'Content-Type: application/json' header — Apps Script Web
    // Apps don't handle the CORS preflight that header triggers, so this is
    // sent as a plain-text body instead (Apps Script still parses it as JSON
    // fine server-side). Fire-and-forget: never blocks or breaks the game.
    fetch(SCORE_LOG_ENDPOINT, {
      method: 'POST',
      body: JSON.stringify({ name: name, score: finalScore, level: level })
    }).then(refreshScoreLog).catch(()=>{});
  }

  function refreshScoreLog(){
    if(!SCORE_LOG_ENDPOINT) return;
    fetch(SCORE_LOG_ENDPOINT)
      .then(res => res.json())
      .then(renderScoreLog)
      .catch(()=>{});
  }

  function renderScoreLog(rows){
    const wrap = document.getElementById('scoreLog');
    const body = document.getElementById('scoreLogBody');
    if(!wrap || !body) return;
    if(!Array.isArray(rows) || !rows.length){
      wrap.style.display = 'none';
      return;
    }
    wrap.style.display = 'block';
    body.innerHTML = rows.map((r,i)=>`
      <div class="row ${i<3?'top':''}">
        <div class="rank">${i+1}</div>
        <div class="name">${escapeHtml(r.name || 'Anonymous')}</div>
        <div class="pts">${r.score}</div>
      </div>`).join('');
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // ---------- Init ----------
  fitCanvas();
  updateMuteButton();
  player.y = groundY - player.h;
  updateHud();
  render();
  requestAnimationFrame(loop);
  refreshScoreLog();
})();
</script>
</body>
</html>
